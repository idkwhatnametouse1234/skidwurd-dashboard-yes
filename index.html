<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skidwurd Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#020617);color:#e2e8f0}
.center{display:flex;justify-content:center;align-items:center;height:100vh;transition:0.3s}

.card{background:#1e293b;padding:30px;border-radius:15px;width:360px;box-shadow:0 10px 30px rgba(56,189,248,0.2);text-align:center}
.card h2{margin-bottom:5px}
.card .sub{color:#94a3b8;margin-bottom:20px}

input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:#0f172a;color:white;font-size:14px}
button{padding:12px;border:none;border-radius:10px;background:linear-gradient(90deg,#38bdf8,#f59e0b);color:white;font-weight:bold;cursor:pointer;width:100%}
button:hover{transform:scale(1.03)}
.link{margin-top:15px;color:#38bdf8;font-size:13px;cursor:pointer}
.hidden{display:none}

.nav{display:flex;justify-content:space-between;background:#1e293b;padding:12px 20px}
.nav button{background:none;color:#38bdf8;cursor:pointer}

.page{display:none;padding:20px}
.active{display:block}

.executor-box{background:#1e293b;padding:20px;border-radius:12px;max-width:700px;margin:auto}

.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:15px}
.game-card{background:#1e293b;border-radius:10px;overflow:hidden}
.game-card img{width:100%;height:120px;object-fit:cover}
</style>
</head>
<body>

<!-- Passkey Auth -->
<div id="auth" class="center">
  <div class="card">
    <h2>Skidwurd Dashboard</h2>
    <div class="sub">Enter your passkey</div>
    <input id="passkey" type="password" placeholder="Enter Passkey">
    <button id="authBtn">Enter</button>
  </div>
</div>

<!-- Main Dashboard -->
<div id="main" class="hidden">
  <div class="nav">
    <div>
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('executor')">Executor</button>
      <button onclick="showPage('games')">Games</button>
    </div>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="home" class="page active">
    <h2 id="welcome"></h2>
  </div>

  <div id="executor" class="page">
    <div class="executor-box">
      <h2>Skidwurd Executor</h2>
      <input id="scriptBox" readonly value='loadstring(game:HttpGet("https://pastefy.app/NIo6hy8W/raw"))()'>
      <button onclick="copyScript()" id="copyBtn">Copy Script</button>
    </div>
  </div>

  <div id="games" class="page">
    <input id="newGame" placeholder="Paste Roblox link">
    <button onclick="addGame()">Add Game</button>
    <div class="games-grid" id="gameList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const $ = id => document.getElementById(id);

$("authBtn").onclick = async () => {
  const key = $("passkey").value.trim();
  if(!key){alert("Enter passkey"); return;}

  const docRef = db.collection("passkeys").doc(key);
  const doc = await docRef.get();

  if(!doc.exists){
    await docRef.set({created:Date.now()});
  }

  localStorage.setItem("currentPasskey", key);
  startApp();
}

function startApp(){
  $("auth").classList.add("hidden");
  $("main").classList.remove("hidden");
  $("welcome").innerText = "Hello, Passkey User";
  loadGames();
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $(id).classList.add('active');
}

async function loadGames(){
  const key = localStorage.getItem("currentPasskey");
  const docRef = db.collection("games").doc(key);
  const doc = await docRef.get();
  const list = doc.exists ? doc.data().list || [] : [];

  const el = $("gameList");
  el.innerHTML='';
  list.forEach(g=>{
    const id=g.match(/games\/(\d+)/)?.[1];
    const thumb=id?`https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png`:'';
    const card=document.createElement('div');
    card.className='game-card';
    card.innerHTML=`<img src="${thumb}"><button onclick="window.open('${g}')">Open</button>`;
    el.appendChild(card);
  });
}

async function addGame(){
  const g = $("newGame").value.trim();
  if(!g.match(/games\/\d+/)){alert("Invalid Roblox link");return;}
  const key = localStorage.getItem("currentPasskey");
  const ref = db.collection("games").doc(key);
  const doc = await ref.get();
  const list = doc.exists ? doc.data().list || [] : [];
  if(list.includes(g)){alert("Already added");return;}
  list.push(g);
  await ref.set({list},{merge:true});
  $("newGame").value='';
  loadGames();
}

function copyScript(){
  navigator.clipboard.writeText($("scriptBox").value);
  $("copyBtn").innerText="Copied!";
  setTimeout(()=>$("copyBtn").innerText="Copy Script",1500);
}

// Logout
function logout(){
  localStorage.removeItem("currentPasskey");
  location.reload();
}
</script>

</body>
</html>
